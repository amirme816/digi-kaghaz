<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دیجی کاغذ - پنل بارگذاری کالا</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="top-bar">
        <div class="logo">🛠️ پنل مدیریت سراسری</div>
        <a href="index.html" class="nav-link">🏪 ورود به ویترین ←</a>
    </div>
    <div class="main-container">
        <h1>📦 بارگذاری کالای جدید </h1>
        <form id="productForm" onsubmit="uploadProduct(event)">
            <div class="form-group"><label for="prodTitle">نام کالا:</label><input type="text" id="prodTitle" required></div>
            <div class="form-group"><label for="prodPrice">قیمت اصلی (تومان):</label><input type="number" id="prodPrice" required></div>
            <div class="form-group"><label for="prodStock">📦 موجودی اولیه انبار:</label><input type="number" id="prodStock" required></div>
            
            <div class="form-group checkbox-group">
                <input type="checkbox" id="isAmazing" onchange="toggleAmazingOptions()">
                <label for="isAmazing" style="color:#e61c4d; font-weight:bold; margin-right: 5px;">🔥 پیشنهاد شگفت‌انگیز</label>
            </div>
            
            <div id="amazingOptions" class="amazing-options-box" style="display: none; background: rgba(230, 28, 77, 0.05); padding: 15px; border-radius: 6px; margin-bottom: 15px; border: 1px dashed #e61c4d;">
                <div class="form-group"><label for="discountPercent">🎯 درصد تخفیف:</label><input type="number" id="discountPercent"></div>
                <div class="form-group"><label for="discountDuration">⏳ مدت (دقیقه):</label><input type="number" id="discountDuration"></div>
            </div>
            
            <div class="form-group"><label for="prodDesc">توضیحات کالا:</label><textarea id="prodDesc" rows="3" required></textarea></div>
            
            <div class="media-section">
                <div class="upload-box">
                    <label for="imageInput" class="upload-label" style="display: block; padding: 20px; background: rgba(255,255,255,0.05); border: 1px dashed #555; text-align: center; cursor: pointer; border-radius: 6px;">📸 انتخاب عکس کالا</label>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImage(event)">
                    <img id="imgPreview" src="#" alt="پیش‌نمایش" style="display:none; max-width: 100%; max-height: 200px; margin-top: 15px; border-radius: 8px; object-fit: contain; margin-left: auto; margin-right: auto;">
                </div>
            </div>
            <button type="submit" class="submit-btn" style="margin-top: 20px;">🚀 انتشار کالا </button>
        </form>
    </div>

    <script>
        // اطلاعات اتصال دیتابیس سوپابیس شما
        const SUPABASE_URL = "https://djzsluagybvdklzekpin.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqenNsdWFneWJ2ZGtsemVrcGluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjAyNDIsImV4cCI6MjA5NjkzNjI0Mn0.T9Y4QBREEOFEqlSFu9-6uxKNnHHTxtTQS0nG6dMKRsI";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let encodedImageBase64 = "";

        // باز و بسته کردن باکس شگفت‌انگیز
         Lahze i function toggleAmazingOptions() {
            const isChecked = document.getElementById('isAmazing').checked;
            document.getElementById('amazingOptions').style.display = isChecked ? 'block' : 'none';
        }

        // پیش‌نمایش تصویر و تبدیل آن به Base64 برای ذخیره در سوپابیس
        function previewImage(event) {
            const input = event.target;
            const preview = document.getElementById('imgPreview');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    encodedImageBase64 = e.target.result; // رشته متنی عکس
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // فرستادن اطلاعات کالا به جدول products دیتابیس
        async function uploadProduct(event) {
            event.preventDefault();

            const title = document.getElementById('prodTitle').value.trim();
            const price = parseInt(document.getElementById('prodPrice').value) || 0;
            const stock = parseInt(document.getElementById('prodStock').value) || 0;
            const description = document.getElementById('prodDesc').value.trim();
            const isAmazing = document.getElementById('isAmazing').checked;
            
            let discountPercent = 0;
            let discountDuration = 0;

            if (isAmazing) {
                discountPercent = parseInt(document.getElementById('discountPercent').value) || 0;
                discountDuration = parseInt(document.getElementById('discountDuration').value) || 0;
            }

            if (!encodedImageBase64) {
                alert("لطفاً یک عکس برای کالا انتخاب کنید.");
                return;
            }

            // ارسال به جدول اصلی محصولات
            const { error } = await supabaseClient.from('products').insert([
                {
                    title: title,
                    price: price,
                    stock: stock,
                    description: description,
                    image: encodedImageBase64, // عکس اینجا به صورت متن ذخیره می‌شود
                    is_amazing: isAmazing,
                    discount_percent: discountPercent,
                    discount_duration: discountDuration
                }
            ]);

            if (error) {
                alert("خطا در ثبت کالا روی دیتابیس: " + error.message);
                console.error(error);
            } else {
                alert("🎉 کالا با تمام جزییات و موفقیت منتشر شد!");
                document.getElementById('productForm').reset();
                document.getElementById('imgPreview').style.display = 'none';
                document.getElementById('amazingOptions').style.display = 'none';
                encodedImageBase64 = "";
            }
        }
    </script>
</body>
</html>
