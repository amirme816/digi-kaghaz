<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دیجی کاغذ - پنل بارگذاری آنلاین کالا</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="top-bar">
        <div class="logo">🛠️ پنل مدیریت سراسری</div>
        <a href="index.html" class="nav-link">🏪 ورود به ویترین ←</a>
    </div>
    <div class="main-container">
        <h1>📦 بارگذاری کالای جدید در سرور ابری</h1>
        <form id="productForm">
            <div class="form-group"><label for="prodTitle">نام کالا:</label><input type="text" id="prodTitle" required></div>
            <div class="form-group"><label for="prodPrice">قیمت اصلی (تومان):</label><input type="number" id="prodPrice" required></div>
            <div class="form-group"><label for="prodStock">📦 موجودی اولیه انبار:</label><input type="number" id="prodStock" required></div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="isAmazing" onchange="toggleAmazingOptions()">
                <label for="isAmazing" style="color:#e61c4d; font-weight:bold;">🔥 پیشنهاد شگفت‌انگیز</label>
            </div>
            <div id="amazingOptions" class="amazing-options-box" style="display: none;">
                <div class="form-group"><label for="discountPercent">🎯 درصد تخفیف:</label><input type="number" id="discountPercent"></div>
                <div class="form-group"><label for="discountDuration">⏳ مدت (دقیقه):</label><input type="number" id="discountDuration"></div>
            </div>
            <div class="form-group"><label for="prodDesc">توضیحات کالا:</label><textarea id="prodDesc" rows="3" required></textarea></div>
            <div class="media-section">
                <div class="upload-box">
                    <label for="imageInput" class="upload-label" style="display: block; padding: 20px; background: #eee; text-align: center; cursor: pointer;">📸 انتخاب عکس کالا</label>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImage(event)">
                    <img id="imgPreview" src="#" alt="پیش‌نمایش" style="display:none; max-width: 100%; margin-top: 15px; border-radius: 8px;">
                </div>
            </div>
            <button type="submit" class="submit-btn">🚀 انتشار کالا برای همه کاربران جهان</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
