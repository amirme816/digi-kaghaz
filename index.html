<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دیجی کاغذ - ویترین فروشگاه آنلاین سایبرپانک</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="cyber-bg-animation" id="cyberBg"></div>
    <div class="top-bar">
        <div class="logo">📄 دیجی کاغذ آنلاین</div>
        <div class="header-left">
            <span class="coin-badge"><span class="coin-icon"></span> <span id="userCoins">۰</span> سکه</span>
            <a href="admin.html" class="nav-link admin-link">🛠️ پنل فروشنده</a>
            <select id="themeSelector" class="theme-select" onchange="changeCyberTheme()">
                <option value="light">☀️ تم روشن</option>
                <option value="dark">🌙 حالت تاریک</option>
                <option value="matrix">⚡ ماتریکس</option>
                <option value="neon-pulse">🔮 شفق نئونی</option>
            </select>
            <div class="cart-status">🛒 سبد: <span id="cartCount">۰</span> کالا</div>
        </div>
    </div>
    <div class="main-container">
        <h1 style="text-align: center;">🏪 ویترین زنده دیجی کاغذ</h1>
        <p class="subtitle">محصولات آنلاین ریل تایم! از مای کاغذ تخفیف بخرید.</p>
        <div style="text-align: center; margin-bottom: 20px; display: flex; gap: 10px; justify-content: center;">
            <button class="nav-toggle-btn" onclick="toggleWishlistSection()">❤️ لیست علاقه‌مندی‌ها</button>
            <button class="nav-toggle-btn" style="border-color: #ffcc00; color: #ffcc00;" onclick="toggleMyPaperSection()">🪙 بخش مای کاغذ</button>
        </div>
        <div id="myPaperSection" class="cart-section" style="display: none; border-color: #ffcc00; background: rgba(255, 204, 0, 0.05);">
            <h3 style="color: #ffcc00;">🪙 مرکز خدمات «مای کاغذ»</h3>
            <div id="couponsMarketGrid" class="shop-grid" style="grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;"></div>
            <div style="margin-top: 15px; border-top: 1px dashed #ffcc00; padding-top: 10px;">
                <h4 style="font-size: 13px; margin: 5px 0;">🎫 کدهای تخفیف فعال شما:</h4>
                <ul id="myOwnedCoupons" style="font-size: 12px; padding-right: 20px; color: #2ecc71;"></ul>
            </div>
        </div>
        <div id="wishlistSection" class="cart-section" style="display: none; border-color: #ff007f;">
            <h3>❤️ لیست علاقه‌مندی‌های شما</h3>
            <div id="wishlistItemsContainer" class="shop-grid" style="grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));"></div>
        </div>
        <div id="cartSection" class="cart-section" style="display: none;">
            <h3>🛒 سبد خرید شما</h3>
            <ul id="cartItemsList"></ul>
            <div class="form-group" style="margin-top: 15px;">
                <label style="font-size: 12px;">📅 انتخاب زمان ارسال چرخشی:</label>
                <select id="deliveryTimeSlot" style="padding: 6px; font-size: 12px;">
                    <option value="شنبه صبح">شنبه صبح</option>
                    <option value="دوشنبه عصر">دوشنبه عصر</option>
                </select>
            </div>
            <div class="coupon-box">
                <input type="text" id="couponInput" placeholder="کد تخفیف را وارد کنید">
                <button onclick="applyCoupon()">اعمال</button>
            </div>
            <p id="couponMsg" style="font-size: 11px; margin: 5px 0 0 0; text-align: right;"></p>
            <div class="cart-total" style="margin-top:15px;">
                <span>جمع کل فاکتور:</span>
                <div><span id="totalPrice">۰</span> <span>تومان</span></div>
            </div>
            <button class="checkout-btn" onclick="checkoutAndEarnCoins()">🧹 نهایی کردن خرید</button>
        </div>
        <div class="filter-bar"><input type="text" id="searchInput" oninput="searchProducts()" placeholder="🔍 جستجوی آنی کالا..."></div>
        <div id="shopContainer" class="shop-grid"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
