<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دیجی کاغذ - ورود و عضویت با موبایل</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dark-theme-simple">
    <div class="main-container" style="max-width: 400px; margin-top: 50px;">
        <h2 style="text-align: center; color: #e61c4d;">🔐 احراز هویت سایبرپانک</h2>
        <p style="text-align: center; font-size: 13px; color: #888; margin-bottom: 20px;">با مشخصات خود به شبکه دیجی کاغذ متصل شوید</p>
        
        <form id="authForm">
            <div class="form-group">
                <label>نام:</label>
                <input type="text" id="authFirstName" placeholder="مثال: رضا" required>
            </div>
            <div class="form-group">
                <label>نام خانوادگی:</label>
                <input type="text" id="authLastName" placeholder="مثال: محمدی" required>
            </div>
            <div class="form-group">
                <label>شماره موبایل شما:</label>
                <input type="tel" id="authPhone" placeholder="مثال: 09123456789" style="text-align: left; direction: ltr;" required>
            </div>
            <div class="form-group">
                <label>رمز عبور:</label>
                <input type="password" id="authPassword" placeholder="******" required>
            </div>
            
            <button type="button" onclick="handleSignUp()" class="submit-btn" style="background: #2ecc71; margin-bottom: 10px;">🚀 ایجاد حساب با موبایل (ثبت‌نام)</button>
            <button type="button" onclick="handleSignIn()" class="buy-btn" style="width: 100%; padding: 12px;">🔑 ورود به حساب</button>
        </form>
        
        <div style="text-align: center; margin-top: 15px;">
            <a href="index.html" style="color: #aaa; font-size: 12px; text-decoration: none;">🏪 بازگشت به ویترین فروشگاه</a>
        </div>
    </div>

    <script>
        // اطلاعات اتصال اختصاصی دیتابیس شما
        const SUPABASE_URL = "https://djzsluagybvdklzekpin.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqenNsdWFneWJ2ZGtsemVrcGluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjAyNDIsImV4cCI6MjA5NjkzNjI0Mn0.T9Y4QBREEOFEqlSFu9-6uxKNnHHTxtTQS0nG6dMKRsI";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // تبدیل شماره موبایل ایران به فرمت استاندارد بین‌المللی
        function formatPhoneNumber(phone) {
            let formatted = phone.trim();
            if (formatted.startsWith('0')) {
                formatted = '+98' + formatted.substring(1);
            } else if (!formatted.startsWith('+')) {
                formatted = '+98' + formatted;
            }
            return formatted;
        }

        // ۱. تابع ثبت‌نام با موبایل + ذخیره نام و فامیل
        async function handleSignUp() {
            const firstName = document.getElementById('authFirstName').value.trim();
            const lastName = document.getElementById('authLastName').value.trim();
            const rawPhone = document.getElementById('authPhone').value;
            const password = document.getElementById('authPassword').value;
            
            if(!firstName || !lastName || !rawPhone || !password) { alert("لطفاً همه فیلدها را پر کنید."); return; }
            if(password.length < 6) { alert("رمز عبور باید حداقل ۶ کاراکتر باشد."); return; }

            const phone = formatPhoneNumber(rawPhone);

            // ثبت نام با ارسال متادیتا (نام و فامیل) به سوپابیس
            const { data, error } = await supabaseClient.auth.signUp({ 
                phone, 
                password,
                options: {
                    data: {
                        first_name: firstName,
                        last_name: lastName
                    }
                }
            });

            if (error) {
                alert("خطا در ثبت نام: " + error.message);
            } else if (data.user) {
                alert(`🎉 حساب شما با نام ${firstName} ${lastName} ساخته شد! حالا می‌توانید وارد شوید.`);
            }
        }

        // ۲. تابع ورود با موبایل
        async function handleSignIn() {
            const rawPhone = document.getElementById('authPhone').value;
            const password = document.getElementById('authPassword').value;

            if(!rawPhone || !password) { alert("لطفاً شماره موبایل و رمز عبور را وارد کنید."); return; }

            const phone = formatPhoneNumber(rawPhone);

            const { data, error } = await supabaseClient.auth.signInWithPassword({ phone, password });

            if (error) {
                alert("خطا در ورود: " + error.message);
            } else if (data.user) {
                alert("🔓 خوش آمدید! با موفقیت وارد شدید.");
                window.location.href = "index.html"; // انتقال به ویترین
            }
        }
    </script>
</body>
</html>
