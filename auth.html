<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دیجی کاغذ - ورود و عضویت </title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme-simple">
    <div class="main-container" style="max-width: 400px; margin-top: 50px;">
        <h2 style="text-align: center; color: #e61c4d;">🔐 احراز هویت دیجی کاغذ </h2>
        <p style="text-align: center; font-size: 13px; color: #888; margin-bottom: 20px;">بدون نیاز به سرور و با امنیت کامل لوکال متصل شوید</p>
        
        <form id="authForm">
            <div class="form-group">
                <label>نام:</label>
                <input type="text" id="authFirstName" placeholder="مثال: رضا" required>
            </div>
            <div class="form-group">
                <label>نام خانوادگی:</label>
                <input type="text" id="authLastName" placeholder="مثال: محمدی" required>
            </div>
            <div class="form-group">
                <label>شماره موبایل شما:</label>
                <input type="tel" id="authPhone" placeholder="مثال: 09123456789" style="text-align: left; direction: ltr;" required>
            </div>
            <div class="form-group">
                <label>رمز عبور:</label>
                <input type="password" id="authPassword" placeholder="******" required>
            </div>
            
            <button type="button" onclick="handleSignUp()" class="submit-btn" style="background: #2ecc71; margin-bottom: 10px;">🚀 ایجاد حساب با موبایل (ثبت‌نام)</button>
            <button type="button" onclick="handleSignIn()" class="buy-btn" style="width: 100%; padding: 12px;">🔑 ورود به حساب</button>
        </form>
        
        <div style="text-align: center; margin-top: 15px;">
            <a href="index.html" style="color: #aaa; font-size: 12px; text-decoration: none;">🏪 بازگشت به ویترین فروشگاه</a>
        </div>
    </div>

    <script>
        // تبدیل شماره موبایل ایران به فرمت استاندارد یکپارچه
        function formatPhoneNumber(phone) {
            let formatted = phone.trim();
            if (formatted.startsWith('0')) {
                formatted = '+98' + formatted.substring(1);
            } else if (!formatted.startsWith('+')) {
                formatted = '+98' + formatted;
            }
            return formatted;
        }

        // ۱. تابع ثبت‌نام مستقل و ذخیره روی سیستم خودت (LocalStorage)
        function handleSignUp() {
            const firstName = document.getElementById('authFirstName').value.trim();
            const lastName = document.getElementById('authLastName').value.trim();
            const rawPhone = document.getElementById('authPhone').value;
            const password = document.getElementById('authPassword').value;
            
            if(!firstName || !lastName || !rawPhone || !password) { alert("لطفاً همه فیلدها را پر کنید."); return; }
            if(password.length < 6) { alert("رمز عبور باید حداقل ۶ کاراکتر باشد."); return; }

            const phone = formatPhoneNumber(rawPhone);

            // خواندن لیست تمام کاربران ثبت شده در این مرورگر
            let allUsers = JSON.parse(localStorage.getItem('dk_local_users') || "[]");

            // بررسی تکراری نبودن شماره موبایل
            const userExists = allUsers.some(user => user.phone === phone);
            if (userExists) {
                alert("❌ خطای ثبت‌نام: یک حساب کاربری با این شماره موبایل قبلاً ساخته شده است!");
                return;
            }

            // ساخت شیء پروفایل جدید (با موجودی اولیه ۵ سکه هدیه کاغذ!)
            const newUser = {
                id: Date.now(), // آیدی یکتا
                phone: phone,
                password: password,
                first_name: firstName,
                last_name: lastName,
                coins: 5,
                owned_coupons: [],
                wishlist: []
            };

            // ذخیره در دیتابیس لوکال مرورگر
            allUsers.push(newUser);
            localStorage.setItem('dk_local_users', JSON.stringify(allUsers));

            alert(`🎉 تبریک! حساب شما با نام "${firstName} ${lastName}" .\n🎁 ۵ سکه هدیه آغازین به شما تعلق گرفت! حالا دکمه ورود را بزنید.`);
        }

        // ۲. تابع ورود و احراز هویت محلی
        function handleSignIn() {
            const rawPhone = document.getElementById('authPhone').value;
            const password = document.getElementById('authPassword').value;

            if(!rawPhone || !password) { alert("لطفاً شماره موبایل و رمز عبور را وارد کنید."); return; }

            const phone = formatPhoneNumber(rawPhone);

            // دریافت لیست کاربران از مرورگر
            let allUsers = JSON.parse(localStorage.getItem('dk_local_users') || "[]");

            // پیدا کردن کاربر با شماره و رمز مطابقت داده شده
            const matchedUser = allUsers.find(user => user.phone === phone && user.password === password);

            if (matchedUser) {
                // ذخیره سشن کاربر فعال در سیستم برای خواندن توسط script.js
                localStorage.setItem('dk_current_user', JSON.stringify(matchedUser));
                
                alert(`🔓 خوش آمدید ${matchedUser.first_name}! ورود شما موفقیت‌آمیز بود.`);
                window.location.href = "index.html"; // هدایت مستقیم به صفحه اصلی
            } else {
                alert("❌ خطای ورود: شماره موبایل یا رمز عبور اشتباه است، یا هنوز ثبت‌نام نکرده‌اید.");
            }
        }
    </script>
</body>
</html>
